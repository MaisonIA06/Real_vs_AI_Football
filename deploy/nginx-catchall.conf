server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    default_type text/plain;
    return 404 "Application non configurée sur démonstrateur.tech\n";
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # Certificat par défaut uniquement pour terminer TLS; les sous-domaines HTTPS
    # non configurés auront une alerte certificat tant qu'un wildcard DNS-01
    # n'est pas installé.
    ssl_certificate /etc/letsencrypt/live/xn--dmonstrateur-beb.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--dmonstrateur-beb.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    default_type text/plain;
    return 421 "Application HTTPS non configurée sur démonstrateur.tech\n";
}
