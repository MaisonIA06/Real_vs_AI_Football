# =============================================================================
# Real vs AI — Nginx config pour le VPS (accès par IP)
# =============================================================================
# Installation :
#   sudo cp deploy/nginx-realvsai.conf /etc/nginx/sites-available/realvsai
#   sudo ln -s /etc/nginx/sites-available/realvsai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Créer le mot de passe d'accès :
#   sudo apt install apache2-utils
#   sudo htpasswd -c /etc/nginx/.htpasswd_realvsai equipe
# =============================================================================

server {
    listen 80;
    server_name 187.124.219.253;

    # PAR DÉFAUT : mot de passe requis partout
    auth_basic "Acces restreint - Real vs AI";
    auth_basic_user_file /etc/nginx/.htpasswd_realvsai;

    root /opt/realvsai/frontend/dist;
    index index.html;
    client_max_body_size 100M;

    # =================================================================
    # ZONE OUVERTE — Accès élèves (pas de mot de passe)
    # =================================================================

    # SPA shell pour redirections internes uniquement
    location = /index.html {
        auth_basic off;
        internal;
    }

    # Bundles JS/CSS du frontend
    location /assets/ {
        auth_basic off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers statiques racine (favicon, logos)
    location ~* ^/[^/]+\.(svg|png|ico|jpg|webp)$ {
        auth_basic off;
    }

    # Pages multijoueur — QR code → /multiplayer/join/XXXX
    location /multiplayer/ {
        auth_basic off;
        try_files $uri /index.html;
    }

    # API game (multiplayer + solo)
    location /api/game/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
    }

    # WebSocket (Django Channels / Daphne)
    location /ws/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Fichiers média (images, vidéos, audio du jeu)
    location /media/ {
        auth_basic off;
        alias /opt/realvsai/backend/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Empêcher l'exécution de contenu arbitraire (stored XSS) au cas où un
        # fichier HTML/SVG avec JS réussirait à passer la whitelist serializer.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; media-src 'self'" always;
    }

    # Fichiers statiques Django (admin CSS, DRF)
    location /static/ {
        auth_basic off;
        alias /opt/realvsai/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =================================================================
    # ZONE PROTÉGÉE — hérite du auth_basic global du serveur
    # =================================================================

    # API admin (mot de passe hérité du serveur)
    location /api/admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
    }

    # Tout le reste (mot de passe hérité du serveur)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
