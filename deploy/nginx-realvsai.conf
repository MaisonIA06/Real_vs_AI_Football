# =============================================================================
# Real vs AI — Nginx config pour le VPS (accès par IP)
# =============================================================================
# Installation :
#   sudo cp deploy/nginx-realvsai.conf /etc/nginx/sites-available/realvsai
#   sudo ln -s /etc/nginx/sites-available/realvsai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Créer le mot de passe d'accès :
#   sudo apt install apache2-utils
#   sudo htpasswd -c /etc/nginx/.htpasswd_realvsai equipe
# =============================================================================

server {
    listen 80;
    server_name 204.168.174.92;

    # Protection par mot de passe (Basic Auth)
    auth_basic "Acces restreint - Real vs AI";
    auth_basic_user_file /etc/nginx/.htpasswd_realvsai;

    client_max_body_size 100M;

    # Frontend React (fichiers statiques buildés)
    root /opt/realvsai/frontend/dist;
    index index.html;

    # API Django -> backend container (port 8001 sur l'hôte)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket -> backend container (Django Channels / Daphne)
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Fichiers statiques Django (admin, DRF)
    location /static/ {
        alias /opt/realvsai/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers média (images, audio uploadés)
    location /media/ {
        alias /opt/realvsai/backend/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA : toute route non-matchée -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
