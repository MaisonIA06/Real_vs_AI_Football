# =============================================================================
# Real vs AI — Nginx config production
# Domaine public : realvsai.démonstrateur.tech
# Nom technique : realvsai.xn--dmonstrateur-beb.tech
# =============================================================================

server {
    server_name realvsai.xn--dmonstrateur-beb.tech 187.124.219.253;

    # PAR DÉFAUT : mot de passe requis partout
    auth_basic "Acces restreint - Real vs AI";
    auth_basic_user_file /etc/nginx/.htpasswd_realvsai;

    root /opt/realvsai/frontend/dist;
    index index.html;
    client_max_body_size 100M;

    # =================================================================
    # ZONE OUVERTE — Accès élèves (pas de mot de passe)
    # =================================================================

    # SPA shell pour redirections internes uniquement
    location = /index.html {
        auth_basic off;
        internal;
    }

    # Bundles JS/CSS du frontend
    location /assets/ {
        auth_basic off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers statiques racine (favicon, logos)
    location ~* ^/[^/]+\.(svg|png|ico|jpg|webp)$ {
        auth_basic off;
    }

    # Pages multijoueur — QR code → /multiplayer/join/XXXX
    location /multiplayer/ {
        auth_basic off;
        try_files $uri /index.html;
    }

    # Pages quiz — QR code → /quiz/join/XXXX
    location /quiz/ {
        auth_basic off;
        try_files $uri /index.html;
    }

    # API game (multiplayer + solo)
    location /api/game/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
    }

    # API quiz publique pour les participants
    location /api/quiz/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
    }

    # WebSocket (Django Channels / Daphne)
    location /ws/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Endpoint de santé applicatif public pour monitoring
    location = /health/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
    }

    # Médias bruts pairs/real|ai : NON publics (révèlent réel/IA).
    # Le jeu passe par /media/q/ (opaque). Seul l'admin authentifié
    # (auth_basic global) y accède.
    location /media/pairs/ {
        # PAS de `auth_basic off;` ici : hérite du mot de passe global.
        alias /opt/realvsai/backend/media/pairs/;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; media-src 'self'" always;
    }

    # Fichiers média (images, vidéos, audio du jeu)
    location /media/ {
        auth_basic off;
        alias /opt/realvsai/backend/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self'; media-src 'self'" always;
    }

    # Fichiers statiques Django (admin CSS, DRF)
    location /static/ {
        auth_basic off;
        alias /opt/realvsai/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =================================================================
    # ZONE PROTÉGÉE — hérite du auth_basic global du serveur
    # =================================================================

    # API admin : pas d'auth_basic, protégé par le token DRF IsAdminUser.
    location /api/admin/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Panneau admin (SPA React) : pas d'auth_basic, protégé par le token IsAdminUser.
    location /admin {
        auth_basic off;
        try_files $uri /index.html;
    }

    # Tout le reste (mot de passe hérité du serveur)
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/realvsai.xn--dmonstrateur-beb.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/realvsai.xn--dmonstrateur-beb.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    listen 80;
    listen [::]:80;
    server_name realvsai.xn--dmonstrateur-beb.tech 187.124.219.253;

    # HTTP domaine -> HTTPS domaine
    if ($host = realvsai.xn--dmonstrateur-beb.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    # Ancien accès par IP -> domaine HTTPS propre
    if ($host = 187.124.219.253) {
        return 301 https://realvsai.xn--dmonstrateur-beb.tech$request_uri;
    }

    return 404;
}